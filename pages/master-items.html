<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Items — Trackora Business</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="tk-app">
    <div class="space-y-6">

      <!-- Form -->
      <section class="tk-card p-6">
        <header class="flex items-center justify-between mb-5">
          <div>
            <h2 id="item-form-title" class="text-base font-semibold text-slate-900">Tambah Item</h2>
            <p class="text-xs text-slate-500 mt-0.5">Produk / jasa beserta pemetaan akun GL.</p>
          </div>
          <button type="button" id="btn-cancel-edit" data-testid="btn-cancel-edit"
                  class="tk-btn tk-btn-ghost hidden">Batal Edit</button>
        </header>

        <form id="item-form" data-testid="item-form" class="grid grid-cols-1 md:grid-cols-6 gap-4">
          <div class="md:col-span-1">
            <label class="tk-label">SKU *</label>
            <input id="f-sku" data-testid="f-sku" class="tk-input font-mono" required />
          </div>
          <div class="md:col-span-3">
            <label class="tk-label">Nama Item *</label>
            <input id="f-name" data-testid="f-name" class="tk-input" required />
          </div>
          <div class="md:col-span-1">
            <label class="tk-label">Tipe *</label>
            <select id="f-type" data-testid="f-type" class="tk-select"></select>
          </div>
          <div class="md:col-span-1 flex items-end">
            <label class="flex items-center gap-2 text-sm text-slate-700">
              <input id="f-isActive" type="checkbox" data-testid="f-isActive" checked /> Aktif
            </label>
          </div>

          <!-- Inventory-only -->
          <div id="inv-only" class="md:col-span-6 grid grid-cols-1 md:grid-cols-3 gap-4 hidden">
            <div>
              <label class="tk-label">Costing Method *</label>
              <select id="f-costingMethod" data-testid="f-costingMethod" class="tk-select"></select>
            </div>
            <div>
              <label class="tk-label">Asset Account (Inventory)</label>
              <select id="f-assetAccount" data-testid="f-assetAccount" class="tk-select"></select>
            </div>
            <div>
              <label class="tk-label">COGS Account</label>
              <select id="f-cogsAccount" data-testid="f-cogsAccount" class="tk-select"></select>
            </div>
          </div>

          <div class="md:col-span-2">
            <label class="tk-label">Unit Price</label>
            <input id="f-unitPrice" type="number" step="0.01" data-testid="f-unitPrice" class="tk-input" />
          </div>
          <div class="md:col-span-2">
            <label class="tk-label">Cost</label>
            <input id="f-cost" type="number" step="0.01" data-testid="f-cost" class="tk-input" />
          </div>
          <div class="md:col-span-2">
            <label class="tk-label">Income Account</label>
            <select id="f-incomeAccount" data-testid="f-incomeAccount" class="tk-select"></select>
          </div>

          <div class="md:col-span-6">
            <label class="tk-label">Deskripsi</label>
            <textarea id="f-description" data-testid="f-description" class="tk-textarea" rows="2"></textarea>
          </div>

          <div class="md:col-span-6 flex justify-end">
            <button type="submit" id="btn-save-item" data-testid="btn-save-item" class="tk-btn tk-btn-primary">Simpan Item</button>
          </div>
        </form>
      </section>

      <!-- Table -->
      <section class="tk-card overflow-hidden">
        <div class="p-4 flex items-center justify-between border-b border-slate-200">
          <h3 class="text-sm font-semibold text-slate-900">Daftar Item</h3>
          <input id="items-search" data-testid="items-search" placeholder="Cari SKU / nama..."
                 class="tk-input max-w-xs" />
        </div>
        <div class="overflow-x-auto">
          <table class="tk-table">
            <thead>
              <tr>
                <th>SKU</th>
                <th>Nama</th>
                <th>Tipe</th>
                <th>Costing</th>
                <th class="text-right">Harga</th>
                <th class="text-right">Cost</th>
                <th>Income Acc.</th>
                <th class="text-right pr-4">Aksi</th>
              </tr>
            </thead>
            <tbody id="items-tbody" data-testid="items-tbody"></tbody>
          </table>
        </div>
        <div id="items-empty" class="hidden p-8 text-center text-sm text-slate-500">
          Belum ada item.
        </div>
      </section>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/modules/ui.js"></script>
  <script src="../js/modules/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/modules/items.js"></script>
</body>
</html>
