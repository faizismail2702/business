<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal Entries — Trackora Business</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="tk-app">
    <div class="space-y-6">

      <!-- LIST VIEW -->
      <section id="je-list-view" class="space-y-6">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs uppercase tracking-wider font-semibold text-slate-400">Transactions</p>
            <h2 class="text-xl font-semibold text-slate-900">Journal Entries</h2>
          </div>
          <div class="flex items-center gap-2">
            <select id="je-filter-status" data-testid="je-filter-status" class="tk-select max-w-[180px]">
              <option value="">Semua status</option>
              <option value="draft">Draft</option>
              <option value="posted">Posted</option>
              <option value="void">Void</option>
            </select>
            <button type="button" id="btn-new-je" data-testid="btn-new-je" class="tk-btn tk-btn-primary">+ Entry Baru</button>
          </div>
        </div>

        <section class="tk-card overflow-hidden">
          <div class="overflow-x-auto">
            <table class="tk-table">
              <thead>
                <tr>
                  <th>Entry #</th>
                  <th>Tanggal</th>
                  <th>Memo</th>
                  <th>Reference</th>
                  <th class="text-right">Debit</th>
                  <th class="text-right">Credit</th>
                  <th>Status</th>
                  <th class="text-right pr-4">Aksi</th>
                </tr>
              </thead>
              <tbody id="je-tbody" data-testid="je-tbody"></tbody>
            </table>
          </div>
          <div id="je-empty" class="hidden p-8 text-center text-sm text-slate-500">
            Belum ada journal entry.
          </div>
        </section>
      </section>

      <!-- FORM VIEW -->
      <section id="je-form-view" class="space-y-6 hidden">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs uppercase tracking-wider font-semibold text-slate-400">Transactions</p>
            <h2 id="je-form-title" class="text-xl font-semibold text-slate-900">Journal Entry Baru</h2>
            <p id="je-form-meta" class="text-xs text-slate-500 mt-0.5"></p>
          </div>
          <button type="button" id="btn-back-list" data-testid="btn-back-list" class="tk-btn tk-btn-ghost">← Kembali</button>
        </div>

        <form id="je-form" data-testid="je-form" class="space-y-6">

          <!-- Header -->
          <section class="tk-card p-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div>
                <label class="tk-label">Tanggal *</label>
                <input id="f-date" type="date" data-testid="f-date" class="tk-input" required />
              </div>
              <div class="md:col-span-2">
                <label class="tk-label">Memo</label>
                <input id="f-memo" data-testid="f-memo" class="tk-input" placeholder="Deskripsi singkat" />
              </div>
              <div>
                <label class="tk-label">Reference</label>
                <input id="f-reference" data-testid="f-reference" class="tk-input" placeholder="INV-123" />
              </div>
            </div>
          </section>

          <!-- Lines -->
          <section class="tk-card overflow-hidden">
            <div class="p-4 flex items-center justify-between border-b border-slate-200">
              <h3 class="text-sm font-semibold text-slate-900">Lines</h3>
              <button type="button" id="btn-add-line" data-testid="btn-add-line"
                      class="tk-btn tk-btn-secondary text-xs">+ Tambah Baris</button>
            </div>
            <div class="overflow-x-auto">
              <table class="tk-table">
                <thead>
                  <tr>
                    <th style="width:32px">#</th>
                    <th>Account *</th>
                    <th>Deskripsi</th>
                    <th class="text-right" style="width:140px">Debit</th>
                    <th class="text-right" style="width:140px">Credit</th>
                    <th style="width:32px"></th>
                  </tr>
                </thead>
                <tbody id="je-lines-tbody" data-testid="je-lines-tbody"></tbody>
                <tfoot>
                  <tr class="bg-slate-50 border-t-2 border-slate-200">
                    <td colspan="3" class="py-2.5 px-3 text-right text-xs uppercase tracking-wider font-semibold text-slate-500">Total</td>
                    <td class="py-2.5 px-3 text-right font-mono font-semibold text-slate-900" id="je-total-debit"  data-testid="je-total-debit">0</td>
                    <td class="py-2.5 px-3 text-right font-mono font-semibold text-slate-900" id="je-total-credit" data-testid="je-total-credit">0</td>
                    <td></td>
                  </tr>
                  <tr>
                    <td colspan="3" class="py-2 px-3 text-right text-xs text-slate-500">Selisih</td>
                    <td colspan="2" class="py-2 px-3 text-right font-mono text-sm" id="je-diff" data-testid="je-diff">0</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </section>

          <div class="flex justify-end gap-2">
            <button type="button" id="btn-save-draft" data-testid="btn-save-draft" class="tk-btn tk-btn-secondary">Simpan Draft</button>
            <button type="submit" id="btn-save-post" data-testid="btn-save-post" class="tk-btn tk-btn-primary">Simpan &amp; Post</button>
          </div>
        </form>
      </section>

    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/modules/ui.js"></script>
  <script src="../js/modules/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/modules/journal-entries.js"></script>
</body>
</html>
