<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments — Trackora Business</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="tk-app">
    <div class="space-y-6">

      <section id="list-view" class="space-y-6">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs uppercase tracking-wider font-semibold text-slate-400">P2P</p>
            <h2 class="text-xl font-semibold text-slate-900">Vendor Payments</h2>
          </div>
          <div class="flex items-center gap-2">
            <select id="pay-filter-status" data-testid="pay-filter-status" class="tk-select max-w-[180px]">
              <option value="">Semua status</option>
              <option value="draft">Draft</option>
              <option value="posted">Posted</option>
              <option value="void">Void</option>
            </select>
            <button type="button" id="btn-new-pay" data-testid="btn-new-pay" class="tk-btn tk-btn-primary">+ Payment Baru</button>
          </div>
        </div>
        <section class="tk-card overflow-hidden">
          <div class="overflow-x-auto">
            <table class="tk-table">
              <thead>
                <tr><th>Pay #</th><th>Tanggal</th><th>Vendor</th><th>Bank</th><th>Memo</th>
                  <th class="text-right">Total</th><th>Status</th><th class="text-right pr-4">Aksi</th></tr>
              </thead>
              <tbody id="pay-tbody" data-testid="pay-tbody"></tbody>
            </table>
          </div>
          <div id="pay-empty" class="hidden p-8 text-center text-sm text-slate-500">Belum ada payment.</div>
        </section>
      </section>

      <section id="form-view" class="space-y-6 hidden">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs uppercase tracking-wider font-semibold text-slate-400">P2P</p>
            <h2 id="pay-form-title" class="text-xl font-semibold text-slate-900">Vendor Payment Baru</h2>
            <p id="pay-form-meta" class="text-xs text-slate-500 mt-0.5"></p>
          </div>
          <button type="button" id="btn-back-list" data-testid="btn-back-list" class="tk-btn tk-btn-ghost">← Kembali</button>
        </div>

        <section class="tk-card p-6">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div><label class="tk-label">Tanggal *</label><input id="f-date" type="date" data-testid="f-date" class="tk-input" required /></div>
            <div class="md:col-span-2"><label class="tk-label">Vendor *</label><select id="f-vendorId" data-testid="f-vendorId" class="tk-select" required></select></div>
            <div><label class="tk-label">Bank Account</label><select id="f-bankAccountId" data-testid="f-bankAccountId" class="tk-select"></select></div>
            <div class="md:col-span-3"><label class="tk-label">Memo</label><input id="f-memo" data-testid="f-memo" class="tk-input" /></div>
            <div><label class="tk-label">Reference</label><input id="f-reference" data-testid="f-reference" class="tk-input" /></div>
          </div>
          <div class="mt-4 p-3 rounded-md bg-sky-50 text-sky-800 text-xs">
            <b>Auto-journal saat Post:</b> Dr Accounts Payable / Cr Bank account (di atas, atau default dari Settings).
          </div>
        </section>

        <section class="tk-card overflow-hidden">
          <div class="p-4 flex items-center justify-between border-b border-slate-200">
            <h3 class="text-sm font-semibold text-slate-900">Invoice yang Dibayar</h3>
            <button type="button" id="btn-add-pay-line" data-testid="btn-add-pay-line" class="tk-btn tk-btn-secondary text-xs">+ Tambah Invoice</button>
          </div>
          <div class="overflow-x-auto">
            <table class="tk-table">
              <thead>
                <tr><th style="width:32px">#</th><th style="min-width:260px">AP Invoice (open)</th>
                  <th class="text-right" style="width:140px">Outstanding</th>
                  <th class="text-right" style="width:140px">Amount Bayar</th>
                  <th>Notes</th><th style="width:32px"></th></tr>
              </thead>
              <tbody id="pay-lines-tbody" data-testid="pay-lines-tbody"></tbody>
              <tfoot>
                <tr class="bg-slate-50 border-t-2 border-slate-200">
                  <td colspan="3" class="py-2.5 px-3 text-right text-xs uppercase tracking-wider font-semibold text-slate-500">Total</td>
                  <td class="py-2.5 px-3 text-right font-mono font-semibold text-slate-900" id="pay-total" data-testid="pay-total">0</td>
                  <td colspan="2"></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </section>

        <div class="flex justify-end gap-2">
          <button type="button" id="btn-save-draft" data-testid="btn-save-draft" class="tk-btn tk-btn-secondary">Simpan Draft</button>
          <button type="button" id="btn-save-post"  data-testid="btn-save-post"  class="tk-btn tk-btn-primary">Simpan &amp; Post (auto-journal)</button>
        </div>
      </section>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/modules/ui.js"></script>
  <script src="../js/modules/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/modules/p2p-shared.js"></script>
  <script src="../js/modules/p2p-pay.js"></script>
</body>
</html>
